---
# Train "hey shadowbot" microWakeWord model V2 - with augmentation
# Uses H200 MIG 1g.18gb slice on IBM cluster
apiVersion: batch/v1
kind: Job
metadata:
  name: train-hey-shadowbot-mww-v2
  namespace: user-cnuland
  labels:
    app: wakeword-training
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app: wakeword-training
        kueue.x-k8s.io/queue-name: unreserved
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          env:
            - name: HOME
              value: /workspace
            - name: PIP_TARGET
              value: /workspace/pip-pkgs
            - name: PYTHONPATH
              value: /workspace/pip-pkgs:/workspace/microWakeWord
            - name: PATH
              value: /workspace/pip-pkgs/bin:/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Checking GPU ==="
              python -c "import torch; print('CUDA:', torch.cuda.is_available()); print('Device:', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'CPU')"

              echo "=== Writing training script ==="
              cat /workspace/scripts/train_microwakeword_v2.py > /workspace/train_script.py

              echo "=== Running training script ==="
              python /workspace/train_script.py 2>&1 | tee /workspace/train_mww_v2.log

              echo "=== Done ==="
              find /output -type f 2>/dev/null
              echo "=== Sleeping 4h for file copy ==="
              sleep 14400
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/mig-1g.18gb: "1"
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/mig-1g.18gb: "1"
          volumeMounts:
            - name: output
              mountPath: /output
            - name: workspace
              mountPath: /workspace
            - name: scripts
              mountPath: /workspace/scripts
      volumes:
        - name: output
          emptyDir:
            sizeLimit: 5Gi
        - name: workspace
          emptyDir:
            sizeLimit: 50Gi
        - name: scripts
          configMap:
            name: mww-train-script-v2
